<svg width="400" height="480" viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">
  <!-- SportHub Primary Logo -->
  
  <!-- Shield -->
  <g transform="translate(200, 195)">
    <path d="M0 -160 Q100 -150 120 -60 L120 100 Q100 160 0 170 Q-100 160 -120 100 L-120 -60 Q-100 -150 0 -160Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="3"/>
    <path d="M0 -148 Q90 -138 108 -52 L108 92 Q90 148 0 157 Q-90 148 -108 92 L-108 -52 Q-90 -138 0 -148Z" fill="#0d1b2a"/>

    <!-- Field lines -->
    <line x1="-108" y1="20" x2="108" y2="20" stroke="#0ea5a0" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="20" r="30" fill="none" stroke="#0ea5a0" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-148" x2="0" y2="157" stroke="#0ea5a0" stroke-width="0.5" opacity="0.15"/>

    <!-- Football -->
    <g transform="translate(-38, -75)">
      <circle cx="0" cy="0" r="26" fill="#ffffff" opacity="0.95"/>
      <path d="M0 -26 Q8 -14 0 -4 Q-10 -14 0 -26Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M-24 -8 Q-12 -4 -8 6 Q-16 2 -24 -8Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M24 -8 Q12 -4 8 6 Q16 2 24 -8Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M-16 20 Q-6 14 0 20 Q-6 26 -16 20Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M16 20 Q6 14 0 20 Q6 26 16 20Z" fill="#1a1a2e" opacity="0.7"/>
    </g>

    <!-- Volleyball -->
    <g transform="translate(40, -70)">
      <circle cx="0" cy="0" r="22" fill="#f5e642" opacity="0.9"/>
      <line x1="-18" y1="-6" x2="18" y2="-6" stroke="#c4960a" stroke-width="1.5"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#c4960a" stroke-width="1.5"/>
      <line x1="-18" y1="6" x2="18" y2="6" stroke="#c4960a" stroke-width="1.5"/>
      <path d="M-8 -20 Q-2 -6 -8 6 Q-14 -6 -8 -20Z" fill="none" stroke="#c4960a" stroke-width="1" opacity="0.5"/>
      <path d="M8 -20 Q14 -6 8 6 Q2 -6 8 -20Z" fill="none" stroke="#c4960a" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Badminton shuttlecock -->
    <g transform="translate(0, 60)">
      <ellipse cx="0" cy="0" rx="4" ry="4" fill="#ffffff" opacity="0.95"/>
      <line x1="0" y1="4" x2="0" y2="-30" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
      <path d="M-14 -42 Q0 -30 14 -42 Q8 -26 0 -30 Q-8 -26 -14 -42Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    </g>

    <!-- Badge -->
    <g transform="translate(0, 115)">
      <path d="M-50 0 L-20 -15 L20 -15 L50 0 L20 15 L-20 15Z" fill="#0ea5a0" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="4">SPORT</text>
    </g>

    <!-- Year -->
    <g transform="translate(0, -125)">
      <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="500" fill="#4ecdc4" letter-spacing="3" opacity="0.8">EST. 2026</text>
    </g>

    <!-- Accent dots -->
    <circle cx="-90" cy="-30" r="3" fill="#0ea5a0" opacity="0.6"/>
    <circle cx="90" cy="-30" r="3" fill="#e04848" opacity="0.6"/>
    <circle cx="-85" cy="80" r="2" fill="#e6a800" opacity="0.6"/>
    <circle cx="85" cy="80" r="2" fill="#0ea5a0" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" letter-spacing="6" fill="#1a1a2e">SPORTHUB</text>
  <line x1="80" y1="415" x2="320" y2="415" stroke="#0ea5a0" stroke-width="1.5" opacity="0.6"/>
  <text x="200" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" letter-spacing="5" fill="#555566">TOURNAMENT MANAGEMENT</text>
</svg>
