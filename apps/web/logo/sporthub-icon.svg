<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- SportHub Icon - for favicon, app icon, social media avatar -->

  <!-- Shield -->
  <g transform="translate(256, 246)">
    <path d="M0 -210 Q135 -196 162 -78 L162 132 Q135 212 0 226 Q-135 212 -162 132 L-162 -78 Q-135 -196 0 -210Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="4"/>
    <path d="M0 -194 Q122 -182 146 -68 L146 122 Q122 196 0 208 Q-122 196 -146 122 L-146 -68 Q-122 -182 0 -194Z" fill="#0d1b2a"/>

    <!-- Field lines -->
    <line x1="-146" y1="26" x2="146" y2="26" stroke="#0ea5a0" stroke-width="1.2" opacity="0.3"/>
    <circle cx="0" cy="26" r="40" fill="none" stroke="#0ea5a0" stroke-width="1.2" opacity="0.3"/>
    <line x1="0" y1="-194" x2="0" y2="208" stroke="#0ea5a0" stroke-width="0.6" opacity="0.15"/>

    <!-- Football -->
    <g transform="translate(-50, -95)">
      <circle cx="0" cy="0" r="34" fill="#ffffff" opacity="0.95"/>
      <path d="M0 -34 Q10 -18 0 -5 Q-13 -18 0 -34Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M-32 -10 Q-16 -5 -10 8 Q-21 3 -32 -10Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M32 -10 Q16 -5 10 8 Q21 3 32 -10Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M-21 26 Q-8 18 0 26 Q-8 34 -21 26Z" fill="#1a1a2e" opacity="0.7"/>
      <path d="M21 26 Q8 18 0 26 Q8 34 21 26Z" fill="#1a1a2e" opacity="0.7"/>
    </g>

    <!-- Volleyball -->
    <g transform="translate(54, -88)">
      <circle cx="0" cy="0" r="29" fill="#f5e642" opacity="0.9"/>
      <line x1="-24" y1="-8" x2="24" y2="-8" stroke="#c4960a" stroke-width="2"/>
      <line x1="-27" y1="0" x2="27" y2="0" stroke="#c4960a" stroke-width="2"/>
      <line x1="-24" y1="8" x2="24" y2="8" stroke="#c4960a" stroke-width="2"/>
      <path d="M-10 -26 Q-3 -8 -10 8 Q-18 -8 -10 -26Z" fill="none" stroke="#c4960a" stroke-width="1.2" opacity="0.5"/>
      <path d="M10 -26 Q18 -8 10 8 Q3 -8 10 -26Z" fill="none" stroke="#c4960a" stroke-width="1.2" opacity="0.5"/>
    </g>

    <!-- Badminton shuttlecock -->
    <g transform="translate(0, 78)">
      <ellipse cx="0" cy="0" rx="5" ry="5" fill="#ffffff" opacity="0.95"/>
      <line x1="0" y1="5" x2="0" y2="-38" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
      <path d="M-18 -54 Q0 -38 18 -54 Q10 -34 0 -38 Q-10 -34 -18 -54Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    </g>

    <!-- Badge -->
    <g transform="translate(0, 152)">
      <path d="M-66 0 L-26 -20 L26 -20 L66 0 L26 20 L-26 20Z" fill="#0ea5a0" opacity="0.9"/>
      <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="5">SPORT</text>
    </g>

    <!-- Year -->
    <g transform="translate(0, -164)">
      <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500" fill="#4ecdc4" letter-spacing="4" opacity="0.8">EST. 2026</text>
    </g>

    <!-- Accent dots -->
    <circle cx="-120" cy="-38" r="4" fill="#0ea5a0" opacity="0.6"/>
    <circle cx="120" cy="-38" r="4" fill="#e04848" opacity="0.6"/>
    <circle cx="-114" cy="105" r="3" fill="#e6a800" opacity="0.6"/>
    <circle cx="114" cy="105" r="3" fill="#0ea5a0" opacity="0.6"/>
  </g>
</svg>
